    <!-- Accessibility Skip Link -->
    <style>
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border-width: 0;
      }
      .sr-only:focus {
        position: static;
        width: auto;
        height: auto;
        padding: inherit;
        margin: inherit;
        overflow: visible;
        clip: auto;
        white-space: normal;
      }
    </style>
  </head>
  <body>
    <!-- Skip to main content link (hidden but keyboard accessible) -->
    <a href="#main-content" class="sr-only">Passer au contenu principal</a>

    <!-- Cloudflare Turnstile CAPTCHA (gratuit, sans publicité) -->
