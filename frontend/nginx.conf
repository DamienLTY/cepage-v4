server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_types text/html application/json application/javascript text/css;

    # Proxy API vers le backend Node.js
    location /api/ {
        proxy_pass http://backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # Fichiers JSON dynamiques (générés par le scraping backend)
    # Volume wines_data monté en /data/public → priorité sur les fichiers buildés
    location ~* \.(json)$ {
        root /data/public;
        try_files $uri @json_builtin;
        add_header Cache-Control "no-cache";
    }

    location @json_builtin {
        root /usr/share/nginx/html;
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    # SPA fallback (toutes les routes → index.html)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store" always;
    }
}
