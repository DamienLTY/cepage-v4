services:

  # ── PostgreSQL (unique BDD — vins + users) ────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cepage-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cepage
      POSTGRES_USER: cepage
      POSTGRES_PASSWORD: cepage_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cepage -d cepage"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend Node.js/Express ───────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cepage-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: "5000"
      NODE_ENV: production
      DATABASE_URL: postgresql://cepage:cepage_dev@postgres:5432/cepage
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-}
      ADMIN_SETUP_KEY: ${ADMIN_SETUP_KEY:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY:-1x0000000000000000000000000000000AA}
      APP_URL: ${APP_URL:-http://localhost}
      FRONTEND_PUBLIC: /data/public
      PYTHON_BIN: python3
    volumes:
      - public_data:/data/public
    depends_on:
      postgres:
        condition: service_healthy

  # ── Frontend nginx ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cepage-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - public_data:/data/public:ro
    depends_on:
      - backend

volumes:
  postgres_data:
    name: cepage_postgres_data
  public_data:
    name: cepage_public_data
